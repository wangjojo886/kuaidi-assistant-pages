<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快递助手</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <section id="gate" class="screen gate-screen">
    <div class="panel gate-panel">
      <h1>快递助手</h1>
      <p class="subtle">请输入访问密码后进入</p>
      <label class="field-label" for="gatePassword">访问密码</label>
      <input id="gatePassword" type="password" autocomplete="current-password" placeholder="请输入访问密码">
      <button id="gateBtn" type="button" class="btn btn-primary">进入系统</button>
      <p id="gateStatus" class="status"></p>
    </div>
  </section>

  <main id="app" class="screen app app-hidden">
    <header class="panel header-panel">
      <div class="header-top">
        <div>
          <h1>快递助手</h1>
          <p id="updatedAt" class="updated-at">正在加载最新数据...</p>
        </div>
        <button id="logoutBtn" type="button" class="btn btn-secondary">退出访问</button>
      </div>
      <p id="modeBanner" class="mode-banner">当前为查询模式</p>
    </header>

    <section id="homeView" class="view">
      <div class="panel">
        <h2>请选择入口</h2>
        <div class="entry-actions">
          <button id="openQueryBtn" type="button" class="btn btn-primary">我要查询</button>
          <button id="openAdminBtn" type="button" class="btn btn-secondary">值班录入</button>
        </div>
        <p class="subtle">值班录入默认直接打开手机摄像头扫描条形码。</p>
      </div>
    </section>

    <section id="queryView" class="view view-hidden">
      <div class="panel">
        <div class="section-head">
          <h2>快递查询</h2>
          <button data-go-home type="button" class="btn btn-secondary btn-small">返回首页</button>
        </div>

        <label class="field-label" for="trackingInput">快递单号</label>
        <input id="trackingInput" type="text" autocomplete="off" placeholder="输入单号（支持部分匹配）">

        <label class="field-label" for="dateInput">日期（可选）</label>
        <input id="dateInput" type="date">

        <button id="searchBtn" type="button" class="btn btn-primary">查询</button>
        <p id="queryStatus" class="status"></p>
      </div>

      <section id="results" class="results"></section>
    </section>

    <section id="adminEntryView" class="view view-hidden">
      <div class="panel">
        <div class="section-head">
          <h2>值班录入</h2>
          <button id="adminLogoutBtn" type="button" class="btn btn-secondary btn-small">返回首页</button>
        </div>
        <p class="entry-greeting">🌸 方便兄弟，感谢有你</p>

        <label class="field-label" for="entryLocation">选择位置</label>
        <select id="entryLocation"></select>

        <div id="scannerPanel" class="scanner-panel">
          <div id="scannerViewport" class="scanner-viewport"></div>
          <p class="scanner-note">请把快递面单上的主条形码对准中间扫描框。当前优先识别条形码，不是直接识别数字。</p>
        </div>

        <div class="scan-actions">
          <label for="scanImageInput" class="btn btn-secondary scan-upload-btn">拍照扫条形码</label>
          <input id="scanImageInput" type="file" accept="image/*" capture="environment" class="scan-image-input">
          <button id="restartScanBtn" type="button" class="btn btn-secondary">重新打开摄像头</button>
        </div>

        <div class="manual-entry">
          <label class="field-label" for="manualEntryInput">手动输入单号（备用）</label>
          <div class="manual-entry-row">
            <input id="manualEntryInput" type="text" autocomplete="off" placeholder="扫码不方便时可手动输入单号">
            <button id="manualEntryBtn" type="button" class="btn btn-secondary">手动录入</button>
          </div>
        </div>

        <div id="scanResultCard" class="scan-result-card">
          <div id="scanResultText" class="scan-result-text">等待扫描</div>
          <div id="scanResultHint" class="scan-result-hint">识别成功后会自动录入并停留在当前页面，继续扫下一件即可。</div>
        </div>
        <p id="entryStatus" class="status"></p>
      </div>

      <div class="panel">
        <div class="section-head">
          <h2>最近录入</h2>
        </div>
        <div id="recentEntries" class="recent-list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="./supabase-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
