<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快递助手</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <section id="gate" class="screen gate-screen">
    <div class="panel gate-panel">
      <h1>快递助手</h1>
      <p class="subtle">请输入访问密码后进入</p>
      <label class="field-label" for="gatePassword">访问密码</label>
      <input id="gatePassword" type="password" autocomplete="current-password" placeholder="请输入访问密码">
      <button id="gateBtn" type="button" class="btn btn-primary">进入系统</button>
      <p id="gateStatus" class="status"></p>
    </div>
  </section>

  <main id="app" class="screen app app-hidden">
    <header class="panel header-panel">
      <div class="header-top">
        <div>
          <h1>快递助手</h1>
          <p id="updatedAt" class="updated-at">正在加载最新数据...</p>
        </div>
        <button id="logoutBtn" type="button" class="btn btn-secondary">退出访问</button>
      </div>
      <p id="modeBanner" class="mode-banner">当前为查询模式</p>
    </header>

    <section id="homeView" class="view">
      <div class="panel">
        <h2>请选择入口</h2>
        <div class="entry-actions">
          <button id="openQueryBtn" type="button" class="btn btn-primary">我要查询</button>
          <button id="openAdminBtn" type="button" class="btn btn-secondary">值班录入</button>
        </div>
        <p class="subtle">值班录入推荐安卓手机连接扫码枪使用。</p>
      </div>
    </section>

    <section id="queryView" class="view view-hidden">
      <div class="panel">
        <div class="section-head">
          <h2>快递查询</h2>
          <button data-go-home type="button" class="btn btn-secondary btn-small">返回首页</button>
        </div>

        <label class="field-label" for="trackingInput">快递单号</label>
        <input id="trackingInput" type="text" autocomplete="off" placeholder="输入单号（支持部分匹配）">

        <label class="field-label" for="dateInput">日期（可选）</label>
        <input id="dateInput" type="date">

        <button id="searchBtn" type="button" class="btn btn-primary">查询</button>
        <p id="queryStatus" class="status"></p>
      </div>

      <section id="results" class="results"></section>
    </section>

    <section id="adminLoginView" class="view view-hidden">
      <div class="panel">
        <div class="section-head">
          <h2>值班录入登录</h2>
          <button data-go-home type="button" class="btn btn-secondary btn-small">返回首页</button>
        </div>

        <label class="field-label" for="adminPassword">录入密码</label>
        <input id="adminPassword" type="password" autocomplete="current-password" placeholder="请输入录入密码">
        <button id="adminLoginBtn" type="button" class="btn btn-primary">进入录入</button>
        <p id="adminLoginStatus" class="status"></p>
      </div>
    </section>

    <section id="adminEntryView" class="view view-hidden">
      <div class="panel">
        <div class="section-head">
          <h2>值班录入</h2>
          <div class="section-head-actions">
            <button id="focusInputBtn" type="button" class="btn btn-secondary btn-small">聚焦扫码框</button>
            <button id="adminLogoutBtn" type="button" class="btn btn-secondary btn-small">退出录入</button>
          </div>
        </div>

        <label class="field-label" for="entryLocation">选择位置</label>
        <select id="entryLocation"></select>

        <label class="field-label" for="entryInput">扫码/输入单号</label>
        <input id="entryInput" type="text" autocomplete="off" placeholder="扫码枪扫完后会自动输入到这里">

        <button id="entryAddBtn" type="button" class="btn btn-primary">添加</button>
        <p id="entryStatus" class="status"></p>
      </div>

      <div class="panel">
        <div class="section-head">
          <h2>最近录入</h2>
        </div>
        <div id="recentEntries" class="recent-list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
