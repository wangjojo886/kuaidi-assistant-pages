<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快递查询</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <section id="gate" class="gate">
    <div class="gate-card">
      <h1>快递查询</h1>
      <p class="gate-note">请输入访问密码后查看最新数据</p>
      <label class="field-label" for="gatePassword">访问密码</label>
      <input id="gatePassword" type="password" autocomplete="current-password" placeholder="请输入访问密码">
      <button id="gateBtn" type="button" class="btn-primary">进入查询</button>
      <p id="gateStatus" class="status"></p>
    </div>
  </section>

  <main id="app" class="app app-hidden">
    <header class="header">
      <div class="header-top">
        <h1>快递查询</h1>
        <button id="logoutBtn" type="button" class="btn-secondary">退出访问</button>
      </div>
      <p id="updatedAt" class="updated-at">正在加载最新数据...</p>
    </header>

    <section class="search-panel">
      <label class="field-label" for="trackingInput">快递单号</label>
      <input id="trackingInput" type="text" autocomplete="off" placeholder="输入单号（支持部分匹配）">

      <label class="field-label" for="dateInput">日期（可选）</label>
      <input id="dateInput" type="date">

      <button id="searchBtn" type="button" class="btn-primary">查询</button>
      <p id="status" class="status"></p>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
